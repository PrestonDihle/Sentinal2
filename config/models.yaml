# SENTINEL2 — Model Routing Configuration
# Maps each pipeline component to its designated LLM

# Model identifiers
models:
  gemini_flash: "gemini-2.5-flash"
  claude_sonnet: "anthropic/claude-sonnet-4-20250514"
  claude_opus: "anthropic/claude-opus-4-20250514"

# Per-component model assignments
